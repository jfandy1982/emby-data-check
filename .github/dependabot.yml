version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 5
    target-branch: 'main'
    labels:
      - 'dependencies'
    groups:
      angular:
        patterns:
          - '@angular*'
        update-types:
          - 'minor'
          - 'patch'
      nx:
        patterns:
          - '@nx*'
          - 'nx*'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 3
    target-branch: 'main'
    labels:
      - 'dependencies'
