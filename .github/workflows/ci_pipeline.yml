name: Continuous Integration Pipeline

on:
  push:
    branches:
      - main
      - test
      - prod

  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches-ignore:
      - gh-pages

  workflow_dispatch:
    inputs:
      edc-api-manual:
        description: 'Is app [edc-api] affected?'
        required: false
        type: boolean
        default: false

      edc-ui-ng-manual:
        description: 'Is app [edc-ui-ng] affected?'
        required: false
        type: boolean
        default: false

permissions:
  actions: read
  attestations: read
  checks: read
  contents: read
  deployments: read
  id-token: none
  issues: write
  discussions: read
  packages: read
  pages: read
  pull-requests: write
  repository-projects: read
  security-events: read
  statuses: read

jobs:
  build:
    name: 'Build all projects'

    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: 'Setup Node.js environment'
        uses: actions/setup-node@v4.2.0
        with:
          node-version-file: '.nvmrc'

      - name: 'Install dependencies (via npm)'
        shell: bash
        run: |
          npm install

      - name: 'Build all projects'
        run: npx nx run-many --parallel --target=build

      - name: 'Extract branch name'
        id: extract-branch
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "nxBase=${{ github.event.pull_request.base.ref }}" >> $GITHUB_OUTPUT
          else
            echo "nxBase=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}~1" >> $GITHUB_OUTPUT
          fi

          echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT

      - name: 'Get affected apps'
        id: check-affected-apps
        env:
          headSha: ${{ github.sha }}
          nxBase: ${{ steps.extract-branch.outputs.nxBase }}
          branch: ${{ steps.extract-branch.outputs.branch }}
        shell: bash
        run: |
          git fetch origin $branch
          output=$(npx nx show projects --affected --base=remotes/origin/$nxBase --head=$headSha --json)
          echo "$output"
          affected=$(echo "$output" | yq eval 'select(. != null)' -)
          echo "$affected"

      - name: 'Print outputs'
        shell: bash
        run: |
          echo "Event information:"
          echo "Event name: ${{ github.event_name }}"
          echo "Event Action: ${{ github.event.action }}"
          echo ""
          echo "Git information"
          echo "Target branch: ${{ steps.extract-branch.outputs.branch }}"
          echo "Base branch: ${{ steps.extract-branch.outputs.nxBase }}"
          echo ""
          echo "Triggered manually (from workflow inputs)"
          echo "Is app [edc-api] affected? ${{ inputs.edc-api-manual }}"
          echo "Is app [edc-ui-ng] affected? ${{ inputs.edc-ui-ng-manual }}"

      - name: 'Check formatting'
        id: formatting-check
        env:
          headSha: ${{ github.sha }}
          nxBase: ${{ steps.extract-branch.outputs.nxBase }}
        run: |
          output=$(npx nx format:check --base=remotes/origin/$nxBase --head=$headSha)
          echo "$output"
