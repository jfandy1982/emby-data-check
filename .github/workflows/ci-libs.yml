name: Libs Pipeline

on:
  workflow_call:
    inputs:
      project:
        type: string
        required: true

permissions:
  contents: read

jobs:
  test-libs-unit:
    name: 'Unit Tests'
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: 'Set up Node.js environment'
        uses: ./.github/actions/setup-nodejs
        with:
          need-cache-npm: true
          need-cache-cypress: false

      - name: 'Run unit tests'
        run: npx nx test ${{ inputs.project }} --skip-nx-cache

      - name: 'Upload coverage artifacts'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-${{ inputs.project }}-unit
          path: coverage/libs/${{ inputs.project }}/
          retention-days: 3
