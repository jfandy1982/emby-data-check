name: Libs Pipeline

on:
  workflow_call:
    inputs:
      project:
        type: string
        required: true

jobs:
  test-libs-unit:
    name: 'Unit Tests'
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0

      - name: 'Set up Node.js environment'
        uses: ./.github/actions/setup-nodejs
        with:
          need-cache-npm: true
          need-cache-cypress: false

      - name: 'Run unit tests'
        run: npx nx test ${{ inputs.project }} --skip-nx-cache

      - name: 'Upload coverage artifacts'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ inputs.project }}-unit
          path: coverage/libs/${{ inputs.project }}/
