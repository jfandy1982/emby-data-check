name: 'Pull Request Labeler'

on:
  workflow_dispatch:
  pull_request_target:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  labeler:
    name: 'Label Pull-Requests'

    runs-on: ubuntu-latest

    steps:
      - name: 'Add labels'
        uses: actions/labeler@v4.3.0
        with:
          configuration-path: .github/labeler_config.yml
          repo-token: '${{ secrets.GITHUB_TOKEN }}'
          sync-labels: true
