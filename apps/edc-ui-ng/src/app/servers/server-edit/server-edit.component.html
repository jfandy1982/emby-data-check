<div class="content">
  <div [formGroup]="form">
    <mat-form-field floatLabel="auto">
      <input matInput placeholder="Server Name" formControlName="name" #name />
    </mat-form-field>
    <br />
    <mat-form-field floatLabel="auto">
      <input matInput placeholder="Description" formControlName="description" #description />
    </mat-form-field>
    <br />
    <mat-form-field floatLabel="auto">
      <input matInput placeholder="IP Address" formControlName="ipAddress" #ipAddress />
    </mat-form-field>
    <br />
    <mat-form-field floatLabel="auto">
      <input matInput placeholder="Port" formControlName="port" #port />
    </mat-form-field>
    <br />
    <mat-form-field floatLabel="auto">
      <input matInput placeholder="API Key" formControlName="apiKey" #apiKey />
    </mat-form-field>
  </div>

  <button mat-raised-button color="accent" (click)="onCreateServer()">Create Server</button>
</div>
