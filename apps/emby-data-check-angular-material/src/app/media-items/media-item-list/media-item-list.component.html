<table mat-table [dataSource]="mediaItems">
  <ng-container matColumnDef="mediaItemId">
    <th mat-header-cell *matHeaderCellDef>Media Item ID (internal)</th>
    <td mat-cell *matCellDef="let mediaItem">{{ mediaItem.mediaItemId }}</td>
  </ng-container>

  <ng-container matColumnDef="embyMediaItemId">
    <th mat-header-cell *matHeaderCellDef>Emby Media Item ID</th>
    <td mat-cell *matCellDef="let mediaItem">{{ mediaItem.embyMediaItemId }}</td>
  </ng-container>

  <ng-container matColumnDef="embyDisplayName">
    <th mat-header-cell *matHeaderCellDef>Display Name</th>
    <td mat-cell *matCellDef="let mediaItem">{{ mediaItem.embyDisplayName }}</td>
  </ng-container>

  <ng-container matColumnDef="embyType">
    <th mat-header-cell *matHeaderCellDef>Media Type</th>
    <td mat-cell *matCellDef="let mediaItem">{{ mediaItem.embyMediaType }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

  <tr
    mat-row
    *matRowDef="let mediaItem; columns: displayedColumns"
    [routerLink]="['/mediaitems', mediaItem.mediaItemId]"
    [queryParamsHandling]="'preserve'"
  ></tr>
</table>
